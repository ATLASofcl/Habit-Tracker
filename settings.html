<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Settings</title>

    <link rel="stylesheet" href="css/header-menu.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/settings.css">
  </head>
  <body>
    <header>
      <div class="hamburger-menu">
        <input type="checkbox" id="menu-toggle" />
        <label
          for="menu-toggle"
          class="hamburger-icon"
          aria-label="Toggle menu"
        >
          <span></span>
          <span></span>
          <span></span>
        </label>
        <nav class="nav-panel">
          <ul class="nav-list">
            <li><a href="progress.html">Progress</a></li>
            <li><a href="feedback.html">Feedback</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="settings.html">Settings</a></li>
          </ul>
        </nav>
      </div>
      <div class="header-title"><h1>Habit Tracker</h1></div>
    </header>
    <main>
      <h2>User Settings</h2>
      <form class="settings-container" action="#" method="post">

        
        <div class="name-settings">
          <label for="display-name">Display Name:</label><br />
          <input
            type="text"
            id="display-name"
            name="display-name"
          /> <br>

          <label for="settings-email">Email:</label><br />
          <input
            type="email"
            id="settings-email"
            name="settings-email"
          />
        </div>


        <div class="theme-settings">
          <p>Theme:</p> <br>
          <input type="radio" id="dark" name="theme" value="dark" />
          <label for="dark">Dark</label><br />

          <input type="radio" id="light" name="theme" value="light" />
          <label for="light">Light</label><br /><br />
        </div>

        <div class="notification-settings">
          <p>Notifications:</p> <br>
          <input type="checkbox" id="email-updates" name="email-updates" />
          <label for="email-updates">Email updates</label><br />

          <input type="checkbox" id="sms-updates" name="sms-updates" />
          <label for="sms-updates">SMS updates</label><br /><br />
        </div>

        <div class="save-btn-container">
          <input type="submit" value="Save Settings" />
        </div>
      </form>
    </main>
  </body>
</html>
