<main>
  <section>
    <h2>User Settings</h2>

    <form action="#" method="post">
      <label for="display-name">Display Name:</label><br>
      <input type="text" id="display-name" name="display-name"><br><br>

      <label for="settings-email">Email:</label><br>
      <input type="email" id="settings-email" name="settings-email"><br><br>

      <p>Theme:</p>
      <input type="radio" id="dark" name="theme" value="dark">
      <label for="dark">Dark</label><br>

      <input type="radio" id="light" name="theme" value="light">
      <label for="light">Light</label><br><br>

      <p>Notifications:</p>
      <input type="checkbox" id="email-updates" name="email-updates">
      <label for="email-updates">Email updates</label><br>

      <input type="checkbox" id="sms-updates" name="sms-updates">
      <label for="sms-updates">SMS updates</label><br><br>

      <input type="submit" value="Save Settings">
    </form>

  </section>
</main>
