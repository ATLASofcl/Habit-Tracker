<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Log In</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/login.css" />
  </head>

  <body class="login">
    <header>
      <div class="header-title"><h1>Habit Tracker</h1></div>
    </header>

    <main>
      <div class="login-container">
        <form class="login-box">
          <h2>Log In:</h2>

          <label for="login-email">Email:</label>
          <input
            id="login-email"
            name="email"
            type="email"
            autocomplete="email"
          />

          <label for="login-password">Password:</label>
          <input
            id="login-password"
            name="password"
            type="password"
            autocomplete="current-password"
          />

          <p id="login-error" style="color: #ff595e; display: none; margin-top: 10px;"></p>
          <input class="login-btn" type="submit" value="Log In" />
        </form>

        <div class="signup-box">
          <p>Don't have an account?</p>
          <a class="signup-btn" href="signup.html">Sign Up</a>
        </div>
      </div>
    </main>
    <script src="js/utils.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
