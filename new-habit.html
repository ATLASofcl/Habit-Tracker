<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Habit</title>

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/header-menu.css" />
        <link rel="stylesheet" href="css/new-habit.css" />


</head>

<body>
    <header>
        <div class="hamburger-menu">
        <input type="checkbox" id="menu-toggle" />
        <label
            for="menu-toggle"
            class="hamburger-icon"
            aria-label="Toggle menu"
        >
            <span></span>
            <span></span>
            <span></span>
        </label>
        <nav class="nav-panel">
            <ul class="nav-list">
            <li><a href="progress.html">Progress</a></li>
            <li><a href="feedback.html">Feedback</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="settings.html">Settings</a></li>
            </ul>
        </nav>
        </div>
        <div class="header-title"><h1>Habit Tracker</h1></div>
    </header>


    <main>
        <div class="new-habit-title">New habit: </div>

        <form class="new-habit-form" action="mailto:example@email.com" method="post" enctype="text/plain">

            <div class="habit-info">

                <table>
                    <tr>
                        <td><label for="habit-name">Habit Name:</label></td>
                        <td><input type="text" id="habit-name" name="habit-name" required></td>
                    </tr>

                    <tr>
                        <td><label for="habit-emoji">Enter Emoji</label></td>
                        <td><input type="text" id="habit-emoji" name="habit-emoji"></td>
                    </tr>

                    <tr>
                        <td><label for="habit-description">Description:</label></td>
                        <td><textarea name="habit-description" id="habit-description" rows="4" cols="20"></textarea></td>
                    </tr>

                    <tr>
                        <td><label for="habit-category">Category:</label></td>
                        <td><select name="habit-category" id="habit-category">
                            <option value="Health">Health</option>
                            <option value="Productivity">Productivity</option>
                            <option value="Learning">Learning</option>
                        </select></td>
                    </tr>

                    <tr>
                        <td><label for="habit-color">Color:</label></td>
                        <td>
                            <div class="color-picker-container">
                                <label>
                                    <input type="radio" name="habit-color" value="red"  checked>
                                    <div class="red-color-dot" style="--habit-color: #FF595E"></div>
                                </label>

                                <label>
                                    <input class="yellow" type="radio" id="habit-color-yellow" name="habit-color" value="yellow" >
                                    <div class="yellow-color-dot" style="--habit-color: #FFCA3A"></div>
                                </label>

                                <label>
                                    <input class="blue" type="radio" id="habit-color-blue" name="habit-color" value="blue">
                                    <div class="blue-color-dot" style="--habit-color: #1982C4"></div>
                                </label>

                                <label>
                                    <input class="green" type="radio" id="habit-color-green" name="habit-color" value="green">
                                    <div class="green-color-dot" style="--habit-color: #8AC926"></div>
                                </label>

                                <label>
                                    <input class="purple" type="radio" id="habit-color-purple" name="habit-color" value="purple">
                                    <div class="purple-color-dot" style="--habit-color: #6A4C93"></div>
                                </label>

                                <label>
                                    <input class="pink" type="radio" id="habit-color-pink" name="habit-color" value="pink">
                                    <div class="pink-color-dot" style="--habit-color: #ffc6ff"></div>
                                </label>

                                <label>
                                    <input class="orange" type="radio" id="habit-color-orange" name="habit-color" value="orange">
                                    <div class="orange-color-dot" style="--habit-color: #fb5607"></div>
                                </label>
                                <label>
                                    <input class="brown" type="radio" id="habit-color-brown" name="habit-color" value="brown">
                                    <div class="brown-color-dot" style="--habit-color: #9c6644"></div>
                                </label>
                                <label>
                                    <input class="cyan" type="radio" id="habit-color-cyan" name="habit-color" value="cyan">
                                    <div class="cyan-color-dot" style="--habit-color: #9bf6ff"></div>
                                </label>

                                <label>
                                    <input class="hotpink" type="radio" id="habit-color-hotpink" name="habit-color" value="hotpink">
                                    <div class="hotpink-color-dot" style="--habit-color: #f72585"></div>
                                </label>
                            </div>
                        </td>
                    </tr>

                </table>

            </div>

            <div class="habit-goals">
                <table>
                    <tr>
                        <td><label for="goal">How often</label></td>
                        <td><input type="number" id="goal" name="goal" min="1" max="100"></td>
                    </tr>

                    <tr>
                        <td></td>
                    </tr>
                </table>
            </div>

        </form>

    </main>

    <footer>

    </footer>
</body>

</html>
