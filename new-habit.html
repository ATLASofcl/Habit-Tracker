<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Habit</title>

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/header-menu.css" />
    <link rel="stylesheet" href="css/new-habit.css" />
  </head>

  <body>
    <header>
      <div class="hamburger-menu">
        <input type="checkbox" id="menu-toggle" />
        <label
          for="menu-toggle"
          class="hamburger-icon"
          aria-label="Toggle menu"
        >
          <span></span>
          <span></span>
          <span></span>
        </label>
        <nav class="nav-panel">
          <ul class="nav-list">
            <li><a href="progress.html">Progress</a></li>
            <li><a href="feedback.html">Feedback</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="settings.html">Settings</a></li>
          </ul>
        </nav>
      </div>
      <div class="header-title"><h1>Habit Tracker</h1></div>
    </header>

    <main>
      <div class="new-habit-title">New habit:</div>

      <form
        action="mailto:example@email.com"
        method="post"
        enctype="text/plain"
      >
        <div class="new-habit">
          <div class="habit-info">
            <table>
              <tr>
                <td><label for="habit-name">Habit Name:</label></td>
                <td>
                  <input
                    type="text"
                    id="habit-name"
                    name="habit-name"
                    required
                  />
                </td>
              </tr>

              <tr>
                <td><label for="habit-emoji">Enter Emoji</label></td>
                <td>
                  <input type="text" id="habit-emoji" name="habit-emoji" />
                </td>
              </tr>

              <tr>
                <td><label for="habit-description">Description:</label></td>
                <td>
                  <textarea
                    name="habit-description"
                    id="habit-description"
                    rows="4"
                    cols="20"
                  ></textarea>
                </td>
              </tr>

              <tr>
                <td><label for="habit-category">Category:</label></td>
                <td>
                  <select name="habit-category" id="habit-category">
                    <option value="Health">Health</option>
                    <option value="Productivity">Productivity</option>
                    <option value="Learning">Learning</option>
                  </select>
                </td>
              </tr>

              <tr>
                <td><label for="habit-color">Color:</label></td>
                <td>
                  <div class="color-picker-container">
                    <label>
                      <input
                        type="radio"
                        name="habit-color"
                        value="FF595E"
                        checked
                      />
                      <div
                        class="red-color-dot"
                        style="--habit-color: #ff595e"
                      ></div>
                    </label>

                    <label>
                      <input
                        class="yellow"
                        type="radio"
                        id="habit-color-yellow"
                        name="habit-color"
                        value="FFCA3A"
                      />
                      <div
                        class="yellow-color-dot"
                        style="--habit-color: #ffca3a"
                      ></div>
                    </label>

                    <label>
                      <input
                        class="blue"
                        type="radio"
                        id="habit-color-blue"
                        name="habit-color"
                        value="1982C4"
                      />
                      <div
                        class="blue-color-dot"
                        style="--habit-color: #1982c4"
                      ></div>
                    </label>

                    <label>
                      <input
                        class="green"
                        type="radio"
                        id="habit-color-green"
                        name="habit-color"
                        value="8AC926"
                      />
                      <div
                        class="green-color-dot"
                        style="--habit-color: #8ac926"
                      ></div>
                    </label>

                    <label>
                      <input
                        class="purple"
                        type="radio"
                        id="habit-color-purple"
                        name="habit-color"
                        value="6A4C93"
                      />
                      <div
                        class="purple-color-dot"
                        style="--habit-color: #6a4c93"
                      ></div>
                    </label>

                    <label>
                      <input
                        class="pink"
                        type="radio"
                        id="habit-color-pink"
                        name="habit-color"
                        value="ffc6ff"
                      />
                      <div
                        class="pink-color-dot"
                        style="--habit-color: #ffc6ff"
                      ></div>
                    </label>

                    <label>
                      <input
                        class="orange"
                        type="radio"
                        id="habit-color-orange"
                        name="habit-color"
                        value="fb5607"
                      />
                      <div
                        class="orange-color-dot"
                        style="--habit-color: #fb5607"
                      ></div>
                    </label>
                    <label>
                      <input
                        class="brown"
                        type="radio"
                        id="habit-color-brown"
                        name="habit-color"
                        value="9c6644"
                      />
                      <div
                        class="brown-color-dot"
                        style="--habit-color: #9c6644"
                      ></div>
                    </label>
                    <label>
                      <input
                        class="cyan"
                        type="radio"
                        id="habit-color-cyan"
                        name="habit-color"
                        value="9bf6ff"
                      />
                      <div
                        class="cyan-color-dot"
                        style="--habit-color: #9bf6ff"
                      ></div>
                    </label>

                    <label>
                      <input
                        class="hotpink"
                        type="radio"
                        id="habit-color-hotpink"
                        name="habit-color"
                        value="f72585"
                      />
                      <div
                        class="hotpink-color-dot"
                        style="--habit-color: #f72585"
                      ></div>
                    </label>
                  </div>
                </td>
              </tr>
            </table>
          </div>

          <div class="habit-goals">
            <table class="goals-container">
              <tr>
                <td><label for="goal">How often</label></td>
                <td>
                  <input
                    type="number"
                    id="goal"
                    name="goal"
                    min="1"
                    max="100"
                    required
                  />
                </td>
              </tr>

              <tr>
                <td><label for="unit">Unit</label></td>
                <td>
                  <select name="unit" id="unit">
                    <option value="cup">Cup</option>
                    <option value="pages">Pages</option>
                    <option value="minutes">Minutes</option>
                    <option value="hours">Hours</option>
                  </select>
                </td>
              </tr>
            </table>
          </div>

          <div class="habit-reminder">
            <table>
              <caption>
                Reminder (optional)
              </caption>

              <tr>
                <td><label for="time">At (time)</label></td>
                <td><input type="time" name="time" id="time" /></td>
              </tr>

              <tr>
                <td><label for="on-days">on days</label></td>
                <td class="on-days-selector">
                  <input type="radio" name="on-days" id="mon" value="monday" />
                  <label for="mon">Mon</label>

                  <input type="radio" name="on-days" id="tue" value="tuesday" />
                  <label for="tue">Tue</label>

                  <input
                    type="radio"
                    name="on-days"
                    id="wed"
                    value="wednesday"
                  />
                  <label for="wed">Wed</label>

                  <input
                    type="radio"
                    name="on-days"
                    id="thu"
                    value="thursday"
                  />
                  <label for="thu">Thu</label>

                  <input type="radio" name="on-days" id="fri" value="friday" />
                  <label for="fri">Fri</label>

                  <input
                    type="radio"
                    name="on-days"
                    id="sat"
                    value="saturday"
                  />
                  <label for="sat">Sat</label>

                  <input type="radio" name="on-days" id="sun" value="sunday" />
                  <label for="sun">Sun</label>
                </td>
              </tr>
            </table>
          </div>
        </div>

        <div class="form-actions">
          <input class="btn-clear" type="reset" value="Clear" />
          <input class="btn-submit" type="submit" value="Create Habit" />
        </div>
      </form>
    </main>

  </body>
</html>
