<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/signup.css" />
  </head>

  <body class="signup">

    <header>
      <div class="header-title"><h1>Habit Tracker</h1></div>
    </header>

    <main>

      <div class="signup-container">

        <form class="signup-form">

          <h2>Sign Up:</h2>

          <label for="signup-name">Full Name:</label>
          <input id="signup-name" name="name" type="text" autocomplete="name">

          <label for="signup-email">Email:</label>
          <input id="signup-email" name="email" type="email" autocomplete="email">

          <label for="signup-password">Password:</label>
          <input id="signup-password" name="password" type="password" autocomplete="new-password">

          <label for="signup-country">Country:</label>
          <input id="signup-country" name="country" type="text" autocomplete="country">

          <input class="signup-submit" type="submit" value="Sign Up">

        </form>

        <div class="signup-box">
          <p>Already have an account?</p>
          <a class="signup-btn" href="login.html">Login</a>
        </div>

      </div>

    </main>
  </body>
</html>
